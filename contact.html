<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Brown - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portfolio-page">
        <nav>
            <div class="nav-container">
                <a href="index.html" class="logo">Joshua Brown</a>
                <ul class="nav-tabs">
                    <li><a href="about.html">About</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="skills.html">Skills</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
                <a href="index.html" class="back-btn">← Back</a>
            </div>
        </nav>

        <div class="container">
            <div class="section">
                <h2>Contact Me</h2>
                <form class="contact-form" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
                <div class="contact-info">
                    <p><strong>Email:</strong> <a href="mailto:jjthejb@gmail.com">jjthejb@gmail.com</a></p>
                    <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/joshua---brown/" target="_blank">linkedin.com/in/joshua---brown</a></p>
                    <p><strong>GitHub:</strong> <a href="https://github.com/mediocrethott" target="_blank" class="contact-btn">GitHub Profile</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('Thank you for your message! This is a demo form. In a real implementation, this would send your message.');
            event.target.reset();
        }
    </script>
    <script src="particles.js"></script>
</body>
